services:
  web_service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:5000"
    volumes:
      - pipeline_uploads:/tmp/pipeline_uploads
      - pipeline_outputs:/tmp/pipeline_outputs
    environment:
      - UPLOAD_DIR=/tmp/pipeline_uploads
      - OUTPUT_DIR=/tmp/pipeline_outputs
      - MODEL_OPTIMIZER_URL=http://model_optimizer:3000
    depends_on:
      - model_optimizer
    restart: unless-stopped

  model_optimizer:
    build:
      context: ./model_optimizer
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "3000:3000"
    volumes:
      - model_optimizer_temp:/app/temp
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

volumes:
  pipeline_uploads:
  pipeline_outputs:
  model_optimizer_temp:
